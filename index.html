<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>0歳から18歳まで</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      box-sizing: border-box;
      color: white;
      text-shadow: 0 0 10px rgba(0,0,0,0.7);
      z-index: 2;
    }
    #title {
      text-align: center;
      font-size: clamp(22px, 4vw, 38px);
      font-weight: bold;
      margin-top: 8px;
    }
    #ageLabel {
      align-self: center;
      margin-bottom: 16px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.2);
      font-size: clamp(18px, 2.8vw, 28px);
      font-weight: bold;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      font-size: 18px;
      z-index: 3;
      background: rgba(0,0,0,0.85);
      white-space: pre-line;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">読み込み中…✨</div>
    <div id="overlay">
      <div id="title">0歳から18歳まで</div>
      <div id="ageLabel">0歳</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.180.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    const loading = document.getElementById("loading");
    const ageLabel = document.getElementById("ageLabel");
    const app = document.getElementById("app");

    const TOTAL_AGES = 19;
    const DURATION = 10;
    const imagePaths = Array.from({ length: TOTAL_AGES }, (_, i) => `${i}.png`);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    const dl = new THREE.DirectionalLight(0xffffff, 1.2);
    dl.position.set(5, 3, 5);
    scene.add(dl);

    const sphereGeo = new THREE.SphereGeometry(2.2, 64, 64);
    const sphereMat = new THREE.MeshStandardMaterial({ roughness: 0.9, metalness: 0 });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    scene.add(sphere);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 1000;
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const r = 18 + Math.random() * 18;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      starPos[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
      starPos[i * 3 + 1] = r * Math.cos(phi);
      starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
    }
    starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.06 }));
    scene.add(stars);

    const loader = new THREE.TextureLoader();
    const textures = [];
    let currentAge = 0;
    let startTime = 0;
    let finished = false;
    const clock = new THREE.Clock();

    function setLoading(text) {
      loading.textContent = text;
    }

    function loadOne(index) {
      return new Promise((resolve, reject) => {
        const path = imagePaths[index];
        loader.load(
          path,
          (tex) => {
            textures[index] = tex;
            setLoading(`読み込み中…✨\n${index + 1} / ${TOTAL_AGES}\n${path}`);
            resolve();
          },
          undefined,
          () => {
            reject(path);
          }
        );
      });
    }

    async function loadAll() {
      for (let i = 0; i < TOTAL_AGES; i++) {
        await loadOne(i);
      }
    }

    function applyTexture(index) {
      sphereMat.map = textures[index];
      sphereMat.needsUpdate = true;
      ageLabel.textContent = `${index}歳`;
    }

    function animate() {
      requestAnimationFrame(animate);

      stars.rotation.y += 0.0005;

      if (!finished) {
        const elapsed = clock.getElapsedTime();
        const t = elapsed - startTime;
        const progress = Math.min(t / DURATION, 1);

        sphere.rotation.y = progress * Math.PI * 2;

        if (progress >= 1) {
          if (currentAge < TOTAL_AGES - 1) {
            currentAge++;
            applyTexture(currentAge);
            startTime = elapsed;
            sphere.rotation.y = 0;
          } else {
            finished = true;
          }
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    loadAll()
      .then(() => {
        applyTexture(0);
        loading.style.display = "none";
        animate();
      })
      .catch((badFile) => {
        setLoading(
          `この画像が読めませんでした😟\n\n${badFile}\n\n` +
          `確認してください:\n` +
          `・index.html と同じ場所にあるか\n` +
          `・ファイル名が完全一致か\n` +
          `・拡張子が .png か`
        );
      });
  </script>
</body>
</html>
